name: TV Build

on:
  push:
    branches: [ tv-adaptation ]
  workflow_dispatch:

jobs:
  build-android-tv:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Clone media-kit for local path dependencies
      run: |
        git clone https://github.com/Predidit/media-kit.git third_party/media-kit
        cd third_party/media-kit
        git checkout 21aacaf9600c4bd00f2a3c57310363bc0cc9597f
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.5'  # 升级到支持 Dart 3.5+ 的版本
        channel: 'stable'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'  # Flutter 3.24+ 可能需要 Java 17
        distribution: 'temurin'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build TV APK (32-bit)
      run: |
        flutter build apk \
          --target-platform android-arm \
          --split-per-abi \
          --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: kazumi-tv-armeabi-v7a
        path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        
    - name: Create Release
      if: github.event_name == 'push'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: tv-v${{ github.run_number }}
        name: Kazumi TV Build ${{ github.run_number }}
        body: |
          小米电视适配版本
          - 支持32位ARM (armeabi-v7a)
          - 兼容Android 5.0 - 9.0
          - 支持遥控器和焦点导航
          - 适配小米输入法
        files: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}